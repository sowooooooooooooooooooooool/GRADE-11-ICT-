<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOWL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-blue: white;
            --glow-blue: black;
            --text-dark: black;
            --text-light: grey;
        }

        body {
            background-image:url("./index/style/homepagebg3.jpg");
	        background-size: cover;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 3rem 5%;
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 3rem;
            right: 5%;
            z-index: 1000;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 3rem;
        }

        nav a {
            text-shadow: white 2px 2px;
            text-decoration: none;
            color: var(--text-dark);
            font-size: 0.95rem;
            font-weight: 400;
            letter-spacing: 0.02em;
            position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 0.5rem 0;
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--primary-blue);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        nav a:hover {
            color: var(--primary-blue);
            text-shadow: 
                0 0 10px var(--glow-blue),
                0 0 20px var(--glow-blue),
                0 0 30px var(--glow-blue);
            transform: translateY(-1px);
        }

        nav a:hover::after {
            width: 100%;
            box-shadow: 
                0 0 8px var(--glow-blue),
                0 0 12px var(--glow-blue);
        }

        /* Main Content */
        .content {
            max-width: 900px;
            margin-top: 15vh;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.3s forwards;
        }

        .headline {
            text-shadow: white 2px 2px;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 300;
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin-bottom: 1.5rem;
            color: var(--text-dark);
        }

        .headline strong {
            text-shadow: white 2px 2px;
            font-weight: 500;
            display: block;
            margin-top: 0.5rem;
        }

        .subtext {
            text-shadow: white 2px 2px;
            font-size: 1.1rem;
            color: var(--text-light);
            max-width: 500px;
            font-weight: 300;
            line-height: 1.8;
            margin-top: 2rem;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 2rem 6%;
            }

            nav {
                top: 2rem;
                right: 6%;
            }

            nav ul {
                gap: 2rem;
            }

            nav a {
                font-size: 0.9rem;
            }

            .content {
                margin-top: 12vh;
            }

            .headline {
                font-size: 2.5rem;
            }

            .subtext {
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            nav ul {
                gap: 1.5rem;
            }

            nav a {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a target="_blank" href="personal.html">Personal</a></li>
            <li><a target="_blank" href="family.html">Family</a></li>
            <li><a target="_blank" href="education.html">Education</a></li>
            <li><a target="_blank" href="collection.html">Collection</a></li>
            <li><a target="_blank" href="./index/card_info.html">Info</a></li>
            <li><a href="./index/login.html">Login</a></li>
        </ul>
    </nav>

    <main class="content">
        <h1 class="headline">
            Welcome to Sowl
            <strong>All about me.</strong>
        </h1>
        <p class="subtext">
            The best of all the people in the world, the best.
        </p>
    </main>
</body>
</html>
