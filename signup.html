<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            background-image: url("signbg.jpg");
            background-size: cover;
        }

        .signup-container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 48px 40px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.15),
                        0 2px 8px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .signup-container:hover {
            box-shadow: 0 12px 48px rgba(31, 38, 135, 0.2),
                        0 4px 12px rgba(0, 0, 0, 0.15);
            transform: translateY(-2px);
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            color: #2d4654;
            margin-bottom: 32px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            width: 20px;
            height: 20px;
            color: #6b8ca3;
            pointer-events: none;
            z-index: 1;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 1.5px solid rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            font-size: 15px;
            color: #2d4654;
            transition: all 0.3s ease;
            outline: none;
        }

        input[type="text"]::placeholder,
        input[type="email"]::placeholder,
        input[type="password"]::placeholder {
            color: #7fa3c3;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus {
            border-color: rgba(106, 140, 163, 0.6);
            background: rgba(255, 255, 255, 0.7);
            box-shadow: 0 0 0 3px rgba(106, 140, 163, 0.1);
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            cursor: pointer;
            user-select: none;
            margin-bottom: 28px;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 8px;
            cursor: pointer;
            accent-color: #6b8ca3;
        }

        .checkbox-wrapper label {
            color: #4a6b7c;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
        }

        .checkbox-wrapper label a {
            color: #6b8ca3;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .checkbox-wrapper label a:hover {
            color: #4a6b7c;
            text-decoration: underline;
        }

        .signup-button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #6b8ca3 0%, #4a6b7c 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(74, 107, 124, 0.3);
            margin-bottom: 20px;
        }

        .signup-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 107, 124, 0.4);
            background: linear-gradient(135deg, #5a7a8f 0%, #3a5a6b 100%);
        }

        .signup-button:active {
            transform: translateY(0);
        }

        .login-link {
            text-align: center;
            font-size: 14px;
            color: #4a6b7c;
        }

        .login-link a {
            color: #6b8ca3;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .login-link a:hover {
            color: #4a6b7c;
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .signup-container {
                padding: 36px 28px;
                border-radius: 20px;
            }

            h1 {
                font-size: 28px;
                margin-bottom: 28px;
            }
        }

 
        *:focus-visible {
            outline: 2px solid #6b8ca3;
            outline-offset: 2px;
        }
    </style>
</head>
<body>

    <div class="signup-container">
        <h1>Sign Up</h1>
        <form>

            <div class="form-group">
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    <input type="text" id="username" placeholder="Username" required aria-label="Username">
                </div>
            </div>

     
            <div class="form-group">
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                        <polyline points="22,6 12,13 2,6"/>
                    </svg>
                    <input type="email" id="email" placeholder="Email Address" required aria-label="Email Address">
                </div>
            </div>


            <div class="form-group">
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input type="password" id="password" placeholder="Password" required aria-label="Password">
                </div>
            </div>

            <div class="form-group">
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input type="password" id="confirm-password" placeholder="Confirm Password" required aria-label="Confirm Password">
                </div>
            </div>

    
            <div class="checkbox-wrapper">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">I agree to the <a href="#">Terms & Conditions</a></label>
            </div>

      
            <button type="submit" onclick="return passwordCheck()" class="signup-button">Sign Up</button>

            <div class="login-link">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </form onsubmit="return passwordCheck()">
    </div>
    <script>
        function passwordCheck() {
       
         var password = document.getElementById("password").value;
         var confirmPassword = document.getElementById("confirm-password").value;

     
         if (password === confirmPassword) {
       
            window.location.href = "login.html";
         return false;
          } else {
         alert("Passwords do not match!");
            return false; 
         }
}
</script>

</body>
</html>
