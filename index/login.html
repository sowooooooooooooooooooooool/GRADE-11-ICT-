<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — SOWL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --pink-light: #ffd6e7;
            --pink-mid: #ff8fbf;
            --pink-deep: #d63f7a;
            --blue-light: #d6eaff;
            --blue-mid: #7ab8f5;
            --blue-deep: #1e5fa8;
            --blue-dark: #0d2b5e;
            --white-tint: rgba(255,255,255,0.88);
            --panel-bg: rgba(255, 240, 248, 0.82);
            --panel-border: rgba(200, 150, 200, 0.4);
            --text: #2a1540;
            --text-soft: #6b4a7a;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(160deg, #e8f0ff 0%, #fce4f0 50%, #e0ecff 100%);
            min-height: 100vh;
            color: var(--text);
            display: flex;
            flex-direction: column;
        }

        /* ── AMBIENT BG GLOW ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
            background-image:
                radial-gradient(ellipse at 20% 80%, rgba(255,182,213,0.18) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(122,184,245,0.18) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(220,200,255,0.10) 0%, transparent 70%);
        }

        /* ── HEADER ── */
        .site-header {
            position: relative;
            width: 100%;
            height: 220px;
            overflow: hidden;
            background: linear-gradient(135deg, #0d2b5e 0%, #2a1256 50%, #0d2b5e 100%);
        }

        .header-overlay-1 {
            position: absolute; inset: 0;
            background: linear-gradient(
                135deg,
                rgba(30, 95, 168, 0.35) 0%,
                rgba(214, 63, 122, 0.20) 50%,
                rgba(30, 95, 168, 0.30) 100%
            );
        }
        .header-overlay-2 {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom,
                rgba(13, 43, 94, 0.15) 0%,
                rgba(0,0,0,0) 40%,
                rgba(230, 200, 230, 0.45) 100%
            );
        }
        .header-overlay-3 {
            position: absolute; inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 3px,
                rgba(255,255,255,0.03) 3px,
                rgba(255,255,255,0.03) 4px
            );
            pointer-events: none;
        }

        .header-title {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
            white-space: nowrap;
        }

        .header-title h1 {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            color: white;
            text-shadow:
                0 0 20px rgba(180, 100, 220, 0.9),
                0 0 40px rgba(100, 160, 255, 0.6),
                0 2px 4px rgba(0,0,0,0.5);
            animation: titleGlow 3s ease-in-out infinite alternate;
        }

        .header-title span {
            font-family: 'Nunito', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 0.35em;
            color: rgba(255,220,240,0.9);
            text-shadow: 0 0 10px rgba(200,150,255,0.8);
            display: block;
            margin-top: 4px;
            text-transform: uppercase;
        }

        @keyframes titleGlow {
            from { text-shadow: 0 0 15px rgba(180,100,220,0.7), 0 0 30px rgba(100,160,255,0.4), 0 2px 4px rgba(0,0,0,0.5); }
            to   { text-shadow: 0 0 25px rgba(220,100,200,0.95), 0 0 50px rgba(120,180,255,0.7), 0 2px 4px rgba(0,0,0,0.5); }
        }

        /* Sakura petals */
        .petals-container {
            position: absolute; inset: 0;
            pointer-events: none; overflow: hidden;
            z-index: 5;
        }

        .petal {
            position: absolute;
            width: 10px; height: 10px;
            border-radius: 50% 0 50% 0;
            opacity: 0;
            animation: petalFall linear infinite;
        }

        @keyframes petalFall {
            0%   { transform: translateY(-20px) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(280px) rotate(720deg); opacity: 0; }
        }

        /* ── TOP NAV ── */
        .top-nav {
            background: linear-gradient(90deg, var(--blue-dark) 0%, #2a1256 50%, var(--blue-dark) 100%);
            border-bottom: 2px solid var(--pink-mid);
            display: flex;
            justify-content: center;
            gap: 0;
            position: relative;
            box-shadow: 0 2px 16px rgba(214,63,122,0.3);
        }

        .top-nav::before {
            content: '';
            position: absolute;
            bottom: -4px; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--blue-mid), transparent);
        }

        .top-nav a {
            display: inline-block;
            padding: 0.6rem 1.5rem;
            color: var(--pink-light);
            text-decoration: none;
            font-size: 0.82rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: all 0.3s ease;
            border-right: 1px solid rgba(255,255,255,0.08);
            position: relative;
            overflow: hidden;
        }

        .top-nav a::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(214,63,122,0.25), rgba(122,184,245,0.25));
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .top-nav a:hover { color: white; }
        .top-nav a:hover::before { transform: translateY(0); }
        .top-nav a.active { color: white; background: rgba(214,63,122,0.18); }

        /* ── PAGE BODY ── */
        .page-body {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            flex: 1;
            padding: 32px 16px 40px;
        }

        /* ── LOGIN PANEL ── */
        .login-panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            overflow: hidden;
            backdrop-filter: blur(6px);
            box-shadow: 0 4px 24px rgba(100,80,160,0.15);
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.6s ease-out both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .panel-title-bar {
            background: linear-gradient(90deg, #b03080, var(--blue-deep));
            color: white;
            font-family: 'Cinzel', serif;
            font-size: 0.82rem;
            letter-spacing: 0.14em;
            padding: 8px 18px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-title-bar::before {
            content: '❀';
            font-size: 0.9rem;
            filter: drop-shadow(0 0 4px rgba(255,180,220,0.8));
        }

        .panel-body {
            padding: 28px 30px 32px;
        }

        /* ── FORM ELEMENTS ── */
        .form-group {
            margin-bottom: 18px;
            position: relative;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            width: 17px;
            height: 17px;
            color: var(--text-soft);
            pointer-events: none;
            z-index: 1;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 11px 14px 11px 42px;
            border: 1.5px solid var(--panel-border);
            border-radius: 6px;
            background: rgba(255, 240, 250, 0.7);
            backdrop-filter: blur(6px);
            font-family: 'Nunito', sans-serif;
            font-size: 0.9rem;
            color: var(--text);
            transition: all 0.3s ease;
            outline: none;
        }

        input[type="text"]::placeholder,
        input[type="password"]::placeholder {
            color: var(--text-soft);
            opacity: 0.75;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--pink-mid);
            background: rgba(255, 245, 252, 0.9);
            box-shadow: 0 0 0 3px rgba(214, 63, 122, 0.1);
        }

        /* ── FORM OPTIONS ── */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
            font-size: 0.82rem;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        input[type="checkbox"] {
            width: 15px;
            height: 15px;
            margin-right: 7px;
            cursor: pointer;
            accent-color: var(--pink-deep);
        }

        .checkbox-wrapper label {
            color: var(--text-soft);
            cursor: pointer;
            font-weight: 500;
        }

        .forgot-password {
            color: var(--blue-deep);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.82rem;
            transition: color 0.25s ease;
        }

        .forgot-password:hover {
            color: var(--pink-deep);
            text-decoration: underline;
        }

        /* ── LOGIN BUTTON ── */
        .login-button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #b03080 0%, var(--blue-deep) 100%);
            border: none;
            border-radius: 6px;
            color: white;
            font-family: 'Cinzel', serif;
            font-size: 0.82rem;
            letter-spacing: 0.14em;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px rgba(176,48,128,0.30);
            margin-bottom: 18px;
            position: relative;
            overflow: hidden;
        }

        .login-button::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(214,63,122,0.25), rgba(122,184,245,0.25));
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(176,48,128,0.40);
        }

        .login-button:hover::before { transform: translateY(0); }
        .login-button:active { transform: translateY(0); }

        /* ── DIVIDER ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(200,150,200,0.4), transparent);
        }

        .divider span {
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            color: var(--text-soft);
            text-transform: uppercase;
        }

        /* ── REGISTER LINK ── */
        .register-link {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-soft);
        }

        .register-link a {
            color: var(--pink-deep);
            text-decoration: none;
            font-weight: 700;
            transition: color 0.25s ease;
        }

        .register-link a:hover {
            color: var(--blue-deep);
            text-decoration: underline;
        }

        /* ── FOOTER ── */
        .site-footer {
            text-align: center;
            padding: 14px;
            font-size: 0.75rem;
            color: var(--text-soft);
            opacity: 0.7;
            border-top: 1px solid rgba(200,150,200,0.3);
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 480px) {
            .site-header { height: 180px; }
            .header-title h1 { font-size: 2.2rem; }
            .top-nav a { padding: 0.5rem 0.9rem; font-size: 0.72rem; }
            .panel-body { padding: 22px 20px 26px; }
            .form-options { flex-direction: column; align-items: flex-start; gap: 10px; }
        }

        *:focus-visible {
            outline: 2px solid var(--pink-mid);
            outline-offset: 2px;
        }
    </style>
</head>
<body>

<!-- ── HEADER ── -->
<header class="site-header">
    <div class="header-overlay-1"></div>
    <div class="header-overlay-2"></div>
    <div class="header-overlay-3"></div>
    <div class="petals-container" id="petals"></div>
    <div class="header-title">
        <h1>SOWL</h1>
        <span>Login</span>
    </div>
</header>

<!-- ── TOP NAV ── -->
<nav class="top-nav">
    <a href="personal.html">Personal</a>
    <a target="_blank" href="family.html">Family</a>
    <a target="_blank" href="education.html">Education</a>
    <a target="_blank" href="collection.html">Collection</a>
    <a href="./index/card_info.html">Info</a>
    <a href="./index/login.html" class="active">Login</a>
</nav>

<!-- ── PAGE BODY ── -->
<div class="page-body">

    <div class="login-panel">
        <div class="panel-title-bar">Login</div>

        <div class="panel-body">
            <form>
                <!-- Username -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input type="text" id="username" placeholder="Username" required aria-label="Username">
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="password" id="password" placeholder="Password" required aria-label="Password">
                    </div>
                </div>

                <!-- Options -->
                <div class="form-options">
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember">Remember me</label>
                    </div>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>

                <!-- Submit -->
                <button type="submit" onclick="return passwordCheck()" class="login-button">Login</button>

                <div class="divider"><span>or</span></div>

                <!-- Register -->
                <div class="register-link">
                    Don't have an account? <a href="signup.html">Register</a>
                </div>
            </form>
        </div>
    </div>

</div>

<!-- ── FOOTER ── -->
<footer class="site-footer">
    &copy; 2026 SOWL &nbsp;·&nbsp; All rights reserved
</footer>

<script>
    // Sakura petals in header
    const container = document.getElementById('petals');
    const colors = ['#ffb3d1','#ffd6e7','#c8a0e8','#a8c8ff','#ffaed4'];

    for (let i = 0; i < 18; i++) {
        const p = document.createElement('div');
        p.className = 'petal';
        const size = 7 + Math.random() * 8;
        p.style.cssText = `
            width: ${size}px;
            height: ${size}px;
            left: ${Math.random() * 100}%;
            background: ${colors[Math.floor(Math.random() * colors.length)]};
            animation-duration: ${3 + Math.random() * 5}s;
            animation-delay: ${Math.random() * 6}s;
            border-radius: ${Math.random() > 0.5 ? '50% 0 50% 0' : '0 50% 0 50%'};
            opacity: 0;
        `;
        container.appendChild(p);
    }

    function passwordCheck() {
        var username = document.getElementById("username").value;
        var password = document.getElementById("password").value;

        if (username === "sowl" && password === "toji123") {
            window.location.href = "homepage.html";
            return false;
        } else if (username === "nice" && password === "wow") {
            window.location.href = "duck-shooter.html";
            return false;
        } else {
            alert("Incorrect username or password!");
            return false;
        }
    }
</script>

</body>
</html>
