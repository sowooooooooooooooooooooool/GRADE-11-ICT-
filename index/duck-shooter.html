<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duck Shooter - Arcade Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            cursor: crosshair;
            user-select: none;
        }

        /* Game Container */
        #gameContainer {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 75%, #90EE90 75%, #90EE90 100%);
            overflow: hidden;
        }

        /* Clouds */
        .cloud {
            position: absolute;
            background: white;
            border-radius: 100px;
            opacity: 0.7;
            animation: floatCloud 30s linear infinite;
        }

        .cloud::before,
        .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 100px;
        }

        .cloud1 {
            width: 80px;
            height: 30px;
            top: 10%;
            left: -100px;
        }

        .cloud1::before {
            width: 40px;
            height: 40px;
            top: -20px;
            left: 10px;
        }

        .cloud1::after {
            width: 50px;
            height: 35px;
            top: -15px;
            right: 10px;
        }

        .cloud2 {
            width: 100px;
            height: 35px;
            top: 25%;
            left: -150px;
            animation-duration: 40s;
            animation-delay: 5s;
        }

        .cloud2::before {
            width: 50px;
            height: 45px;
            top: -22px;
            left: 15px;
        }

        .cloud2::after {
            width: 60px;
            height: 40px;
            top: -18px;
            right: 15px;
        }

        @keyframes floatCloud {
            to {
                transform: translateX(calc(100vw + 200px));
            }
        }

        /* UI Elements */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            z-index: 100;
            pointer-events: none;
        }

        .ui-box {
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        #score {
            color: #FF6B35;
        }

        #lives {
            color: #E63946;
        }

        #highScore {
            color: #FFD700;
        }

        /* Duck Styling */
        .duck {
            position: absolute;
            width: 60px;
            height: 50px;
            cursor: crosshair;
            transition: transform 0.1s;
        }

        .duck:hover {
            transform: scale(1.1);
        }

        .duck-body {
            position: absolute;
            width: 40px;
            height: 30px;
            background: #8B4513;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            left: 10px;
            top: 15px;
        }

        .duck-head {
            position: absolute;
            width: 25px;
            height: 25px;
            background: #228B22;
            border-radius: 50%;
            left: 35px;
            top: 8px;
        }

        .duck-beak {
            position: absolute;
            width: 12px;
            height: 8px;
            background: #FFD700;
            border-radius: 0 50% 50% 0;
            left: 57px;
            top: 17px;
        }

        .duck-eye {
            position: absolute;
            width: 5px;
            height: 5px;
            background: black;
            border-radius: 50%;
            left: 50px;
            top: 15px;
        }

        .duck-wing {
            position: absolute;
            width: 20px;
            height: 15px;
            background: #654321;
            border-radius: 50%;
            left: 20px;
            top: 20px;
            animation: flapWing 0.3s ease-in-out infinite alternate;
        }

        @keyframes flapWing {
            to {
                transform: translateY(-3px) rotate(-5deg);
            }
        }

        /* Golden Duck */
        .golden .duck-body,
        .golden .duck-head {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
        }

        /* Start Screen */
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        #startScreen h1 {
            font-size: 72px;
            color: #FFD700;
            text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .btn {
            padding: 20px 50px;
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #FF6B35 0%, #E63946 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
            pointer-events: all;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
        }

        .btn:active {
            transform: scale(1.05);
        }

        /* Game Over Screen */
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        #gameOverScreen.show {
            display: flex;
        }

        #gameOverScreen h1 {
            font-size: 64px;
            color: #E63946;
            text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        #finalScore {
            font-size: 36px;
            color: #FFD700;
            margin-bottom: 30px;
        }

        /* Hit Effect */
        .hit-effect {
            position: absolute;
            width: 40px;
            height: 40px;
            pointer-events: none;
            z-index: 150;
        }

        .feather {
            position: absolute;
            width: 8px;
            height: 15px;
            background: white;
            border-radius: 50% 50% 0 0;
            animation: fallFeather 1s ease-out forwards;
        }

        @keyframes fallFeather {
            to {
                transform: translateY(100px) rotate(360deg);
                opacity: 0;
            }
        }

        .flash {
            position: absolute;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.8) 0%, transparent 70%);
            border-radius: 50%;
            animation: flashEffect 0.3s ease-out forwards;
        }

        @keyframes flashEffect {
            to {
                transform: scale(2);
                opacity: 0;
            }
        }

        /* Instructions */
        #instructions {
            font-size: 20px;
            color: #FFD700;
            text-align: center;
            margin-top: 20px;
            line-height: 1.6;
        }

        /* Crosshair Cursor */
        body {
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><circle cx="16" cy="16" r="10" fill="none" stroke="red" stroke-width="2"/><line x1="16" y1="2" x2="16" y2="14" stroke="red" stroke-width="2"/><line x1="16" y1="18" x2="16" y2="30" stroke="red" stroke-width="2"/><line x1="2" y1="16" x2="14" y2="16" stroke="red" stroke-width="2"/><line x1="18" y1="16" x2="30" y2="16" stroke="red" stroke-width="2"/></svg>') 16 16, crosshair;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            #startScreen h1 {
                font-size: 48px;
            }

            .btn {
                padding: 15px 40px;
                font-size: 24px;
            }

            .ui-box {
                padding: 10px 15px;
                font-size: 16px;
            }

            #gameOverScreen h1 {
                font-size: 48px;
            }

            #finalScore {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <!-- Clouds for decoration -->
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>

        <!-- UI Elements -->
        <div id="ui">
            <div class="ui-box">Score: <span id="score">0</span></div>
            <div class="ui-box">Lives: <span id="lives">3</span></div>
            <div class="ui-box">High Score: <span id="highScore">0</span></div>
        </div>

        <!-- Start Screen -->
        <div id="startScreen">
            <h1>🦆 DUCK SHOOTER 🦆</h1>
            <button class="btn" id="startBtn">START GAME</button>
            <div id="instructions">
                Click on ducks to shoot them!<br>
                Don't let them escape or you'll lose a life!<br>
                🌟 Golden ducks are worth bonus points! 🌟
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="gameOverScreen">
            <h1>GAME OVER</h1>
            <div id="finalScore">Final Score: 0</div>
            <button class="btn" id="restartBtn">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        // ==================== GAME STATE ====================
        const game = {
            score: 0,
            lives: 3,
            highScore: localStorage.getItem('duckShooterHighScore') || 0,
            isRunning: false,
            ducks: [],
            spawnInterval: null,
            animationFrame: null,
            baseSpeed: 2,
            difficulty: 1
        };

        // ==================== DOM ELEMENTS ====================
        const gameContainer = document.getElementById('gameContainer');
        const scoreElement = document.getElementById('score');
        const livesElement = document.getElementById('lives');
        const highScoreElement = document.getElementById('highScore');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const finalScoreElement = document.getElementById('finalScore');

        // ==================== SOUND EFFECTS ====================
        // Simple sound effects using Web Audio API
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playShootSound() {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(200, audioContext.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.1);
        }

        function playQuackSound() {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(400, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(200, audioContext.currentTime + 0.2);
            
            gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.2);
        }

        function playGameOverSound() {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(400, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 0.5);
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }

        // ==================== DUCK CREATION ====================
        function createDuck() {
            const isGolden = Math.random() < 0.1; // 10% chance for golden duck
            const duck = {
                element: document.createElement('div'),
                x: -100,
                y: Math.random() * (window.innerHeight * 0.6 - 100) + 50,
                speed: game.baseSpeed * game.difficulty * (0.8 + Math.random() * 0.4),
                isGolden: isGolden,
                points: isGolden ? 10 : 1
            };

            // Create duck HTML structure
            duck.element.className = isGolden ? 'duck golden' : 'duck';
            duck.element.innerHTML = `
                <div class="duck-body"></div>
                <div class="duck-head"></div>
                <div class="duck-beak"></div>
                <div class="duck-eye"></div>
                <div class="duck-wing"></div>
            `;

            duck.element.style.left = duck.x + 'px';
            duck.element.style.top = duck.y + 'px';

            // Click handler for shooting
            duck.element.addEventListener('click', () => shootDuck(duck));

            gameContainer.appendChild(duck.element);
            game.ducks.push(duck);
        }

        // ==================== SHOOTING MECHANISM ====================
        function shootDuck(duck) {
            if (!game.isRunning) return;

            playShootSound();
            
            // Update score
            game.score += duck.points;
            scoreElement.textContent = game.score;

            // Update high score
            if (game.score > game.highScore) {
                game.highScore = game.score;
                highScoreElement.textContent = game.highScore;
                localStorage.setItem('duckShooterHighScore', game.highScore);
            }

            // Increase difficulty gradually
            game.difficulty = 1 + (game.score * 0.02);

            // Create hit effect
            createHitEffect(duck.x + 30, duck.y + 25);

            // Remove duck
            duck.element.remove();
            const index = game.ducks.indexOf(duck);
            if (index > -1) {
                game.ducks.splice(index, 1);
            }
        }

        // ==================== HIT EFFECT ====================
        function createHitEffect(x, y) {
            const hitEffect = document.createElement('div');
            hitEffect.className = 'hit-effect';
            hitEffect.style.left = x + 'px';
            hitEffect.style.top = y + 'px';

            // Create flash
            const flash = document.createElement('div');
            flash.className = 'flash';
            hitEffect.appendChild(flash);

            // Create feathers
            for (let i = 0; i < 6; i++) {
                const feather = document.createElement('div');
                feather.className = 'feather';
                feather.style.left = Math.random() * 30 + 'px';
                feather.style.top = Math.random() * 30 + 'px';
                feather.style.animationDelay = Math.random() * 0.2 + 's';
                hitEffect.appendChild(feather);
            }

            gameContainer.appendChild(hitEffect);

            // Remove effect after animation
            setTimeout(() => hitEffect.remove(), 1000);
        }

        // ==================== DUCK SPAWNING ====================
        function startSpawning() {
            function spawn() {
                if (game.isRunning) {
                    createDuck();
                    const nextSpawn = 1000 + Math.random() * 1000; // 1-2 seconds
                    game.spawnInterval = setTimeout(spawn, nextSpawn);
                }
            }
            spawn();
        }

        // ==================== GAME LOOP ====================
        function gameLoop() {
            if (!game.isRunning) return;

            // Update all ducks
            game.ducks.forEach((duck, index) => {
                duck.x += duck.speed;
                duck.element.style.left = duck.x + 'px';

                // Check if duck escaped
                if (duck.x > window.innerWidth) {
                    playQuackSound();
                    duck.element.remove();
                    game.ducks.splice(index, 1);
                    
                    // Lose a life
                    game.lives--;
                    livesElement.textContent = game.lives;

                    // Check game over
                    if (game.lives <= 0) {
                        endGame();
                    }
                }
            });

            game.animationFrame = requestAnimationFrame(gameLoop);
        }

        // ==================== GAME CONTROL ====================
        function startGame() {
            // Reset game state
            game.score = 0;
            game.lives = 3;
            game.difficulty = 1;
            game.isRunning = true;
            game.ducks = [];

            // Update UI
            scoreElement.textContent = game.score;
            livesElement.textContent = game.lives;
            highScoreElement.textContent = game.highScore;

            // Clear any existing ducks
            document.querySelectorAll('.duck').forEach(d => d.remove());

            // Hide start screen
            startScreen.style.display = 'none';
            gameOverScreen.classList.remove('show');

            // Start game
            startSpawning();
            gameLoop();
        }

        function endGame() {
            game.isRunning = false;

            // Stop spawning
            if (game.spawnInterval) {
                clearTimeout(game.spawnInterval);
            }

            // Stop animation
            if (game.animationFrame) {
                cancelAnimationFrame(game.animationFrame);
            }

            // Play game over sound
            playGameOverSound();

            // Show game over screen
            finalScoreElement.textContent = `Final Score: ${game.score}`;
            gameOverScreen.classList.add('show');

            // Remove all remaining ducks
            game.ducks.forEach(duck => duck.element.remove());
            game.ducks = [];
        }

        // ==================== EVENT LISTENERS ====================
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        // Initialize high score display
        highScoreElement.textContent = game.highScore;
    </script>
</body>
</html>
